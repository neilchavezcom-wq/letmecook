<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Directory — LetMeCook</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,600;1,400&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="recipes.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">LetMe<span>Cook.</span></a>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a href="index.html">Home</a>
            <a href="recipes.html" class="active">Recipes</a>
            <button onclick="toggleGlobalKitchenTheme()" style="background: var(--text-main); color: var(--surface); border: none; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-left: 24px;">
                <span class="material-symbols-outlined" id="globalThemeIcon" style="font-size: 1.1rem;">wb_sunny</span>
                <span id="globalThemeText">Kitchen Mode</span>
            </button>
        </div>
    </nav>

    <div class="directory-container">
        <h2>Recipe Collections</h2>
        <p class="directory-desc">Select an entry card below to initialize computer vision gesture parameters.</p>
        
        <div class="search-controls">
            <input type="text" id="searchInput" class="search-input" placeholder="Search by food name, ingredients, descriptions...">
            <button id="filterAll" class="filter-btn active" onclick="setFilter('all')">All Recipes</button>
            <button id="filterFavs" class="filter-btn" onclick="setFilter('favorites')" style="display: flex; align-items: center; gap: 6px;">
                <span class="material-symbols-outlined" style="font-size: 1.2rem; font-variation-settings: 'FILL' 1; color: #f59e0b;">star</span> Bookmarks Only
            </button>
            <a href="add-recipe.html" class="filter-btn" style="display: inline-flex; align-items: center; gap: 6px; text-decoration: none; margin-left: auto; background: var(--primary-light); color: var(--primary); border-color: #ccfbf1;">
                <span class="material-symbols-outlined" style="font-size: 1.2rem;">add_circle</span> Create Recipe
            </a>
        </div>

        <div class="recipe-grid" id="recipeGridContainer"></div>
    </div>

    <script>
        let currentFilterMode = 'all';

        if (!localStorage.getItem('recipeBookmarks')) {
            localStorage.setItem('recipeBookmarks', JSON.stringify([]));
        }

        function renderCatalogGrid() {
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            const bookmarksList = JSON.parse(localStorage.getItem('recipeBookmarks'));
            const gridContainer = document.getElementById('recipeGridContainer');
            let generatedHtml = '';

            const userKeys = [];
            const systemKeys = [];

            for (const key in RECIPE_DATA) {
                if (key.startsWith('user_')) { userKeys.push(key); } 
                else { systemKeys.push(key); }
            }

            const prioritizedKeys = [...userKeys, ...systemKeys];

            prioritizedKeys.forEach(key => {
                const item = RECIPE_DATA[key];
                const isFavorited = bookmarksList.includes(key);

                if (currentFilterMode === 'favorites' && !isFavorited) return;

                const matchesSearch = 
                    item.title.toLowerCase().includes(searchKeyword) ||
                    item.description.toLowerCase().includes(searchKeyword) ||
                    item.ingredients.some(ing => ing.toLowerCase().includes(searchKeyword));

                if (!matchesSearch) return;

                const isUserGenerated = key.startsWith('user_');
                const conditionalShadeClass = isUserGenerated ? 'user-created-card' : '';
                const deleteActionMarkup = isUserGenerated ? `
                    <div class="card-actions-wrapper">
                        <button class="action-icon-btn delete" title="Delete Recipe" onclick="purgeCustomRecipe(event, '${key}')">
                            <span class="material-symbols-outlined" style="font-size: 1.2rem;">delete</span>
                        </button>
                    </div>
                ` : '';

                generatedHtml += `
                    <div class="recipe-directory-card ${conditionalShadeClass}" style="cursor: pointer; padding-bottom: 80px;" onclick="navigateToRecipe(event, '${key}')">
                        <button class="fav-btn" onclick="toggleBookmarkState(event, '${key}')" style="display: flex; align-items: center; justify-content: center;">
                            <span class="material-symbols-outlined" style="color: ${isFavorited ? '#f59e0b' : 'var(--text-muted)'}; font-variation-settings: 'FILL' ${isFavorited ? 1 : 0};">
                                star
                            </span>
                        </button>
                        <div class="card-header">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                        </div>
                        ${deleteActionMarkup}
                        <div class="card-footer">
                            <span>⏱ ${item.time}</span>
                            <span class="divider">|</span>
                            <span>Level: ${item.level}</span>
                        </div>
                    </div>
                `;
            });

            gridContainer.innerHTML = generatedHtml || `<p style="color:var(--text-muted); text-align:center; grid-column: 1/-1; padding: 40px 0;">No matching entries found.</p>`;
        }

        function purgeCustomRecipe(event, recipeKey) {
            event.stopPropagation();
            if (confirm("Are you sure you want to permanently delete this custom recipe?")) {
                let userRecipes = JSON.parse(localStorage.getItem('userCustomRecipes')) || {};
                delete userRecipes[recipeKey];
                localStorage.setItem('userCustomRecipes', JSON.stringify(userRecipes));
                
                let bookmarks = JSON.parse(localStorage.getItem('recipeBookmarks')) || [];
                bookmarks = bookmarks.filter(k => k !== recipeKey);
                localStorage.setItem('recipeBookmarks', JSON.stringify(bookmarks));
                
                window.location.reload();
            }
        }

        function toggleBookmarkState(event, recipeKey) {
            event.stopPropagation();
            let bookmarks = JSON.parse(localStorage.getItem('recipeBookmarks'));

            if (bookmarks.includes(recipeKey)) { bookmarks = bookmarks.filter(k => k !== recipeKey); } 
            else { bookmarks.push(recipeKey); }

            localStorage.setItem('recipeBookmarks', JSON.stringify(bookmarks));
            renderCatalogGrid();
        }

        function setFilter(mode) {
            currentFilterMode = mode;
            document.getElementById('filterAll').classList.toggle('active', mode === 'all');
            document.getElementById('filterFavs').classList.toggle('active', mode === 'favorites');
            renderCatalogGrid();
        }

        function navigateToRecipe(event, recipeKey) {
            window.location.href = `cooking.html?recipe=${recipeKey}`;
        }

        document.getElementById('searchInput').addEventListener('input', renderCatalogGrid);
        renderCatalogGrid();
    </script>
</body>
</html>
